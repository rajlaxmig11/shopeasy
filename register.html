<!DOCTYPE html>
<html>
<head>
    <title>Register - ShopEasy</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="container">

    <div class="login-box">

        <h2>Create Account</h2>

        <input type="text"
               id="name"
               placeholder="Full Name">

        <input type="email"
               id="regEmail"
               placeholder="Email">

        <input type="password"
               id="regPassword"
               placeholder="Password">

        <button onclick="register()">
            Register
        </button>

    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
